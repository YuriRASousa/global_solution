name: firewatch
description: FireWatch - Monitoramento de Queimadas com Tecnologia Espacial
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^11.0.0
  flutter_map: 7.0.2
  latlong2: 0.9.1
  fl_chart: ^0.67.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  permission_handler: ^11.3.0
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  
  # Adicione assets de imagem aqui se necessário
  # assets:
  #   - assets/images/

